version: "3"
silent: true

vars:
  LOGIN_SHELL: zsh
  OS_TYPE:
    sh: |
      . /etc/os-release
      case "$ID" in
        arch|cachyos)  echo "arch" ;;
        ubuntu|debian) echo "debian" ;;
        fedora)        echo "fedora" ;;
        *)             echo "Unsupported OS" && exit 1 ;;
      esac
  DISTRO_PACKAGE_MANAGER:
    sh: |
      case "{{.OS_TYPE}}" in
        arch)   echo "sudo pacman -Sy --noconfirm" ;;
        fedora) echo "sudo dnf install -y" ;;
        debian) echo "sudo apt install -y" ;;
      esac
  CUSTOM_PACKAGE_MANAGER:
    sh: |
      case "{{.OS_TYPE}}" in
        arch) echo "paru -S --noconfirm" ;;
        *)    echo "brew install" ;;
      esac
  OS_CONFIG_SELECTOR:
    sh: |
      case "{{.OS_TYPE}}" in
        arch) echo "arch" ;;
        *)    echo "other" ;;
      esac
  USE_SYSTEMD:
    sh: |
      if [ "$(ps -p 1 -o comm=)" == "systemd" ]; then
        echo "true"
      else
        echo "false"
      fi
  CONFIG_RAW:
    sh: cat task/config.yaml
  CONFIG:
    ref: "fromYaml .CONFIG_RAW"

# ============================

tasks:
  help:
    desc: Show available commands
    cmds:
      - task --list 2>/dev/null || go-task --list

  default:
    cmds:
      - task: help

  # ==========================

  install-package:
    cmd: |
      if ! command -v {{.CLI}} >/dev/null 2>&1; then
        echo "❌ {{.PKG}} not found, installing..."
        {{.INSTALLER}}
      else
        echo "✅ {{.PKG}} found"
      fi

  test-file-install-package:
    cmd: |
      if ! [ -f "{{.FILE}}" ]; then
        echo "❌ {{.PKG}} not found, installing..."
        {{.INSTALLER}}
      else
        echo "✅ {{.PKG}} found"
      fi

  # install-systemd-package:
  #   cmds:
  #     - task: install-package
  #       vars:
  #         CLI: "{{.CLI}}"
  #         PKG: "{{.PKG}}"
  #         INSTALLER: "{{.INSTALLER}}"
  #     - cmd: sudo systemctl enable --now "{{.CLI}}" || true

  # =====================

  install-package-manager:
    desc: install Paru or Brew based on distro
    cmd: |
      echo "ℹ️ Installing custom package manager"
      set -eu
      if  command -v paru >/dev/null 2>&1 || command -v brew >/dev/null 2>&1 ; then
        echo "✅ Custom package manager already installed"
        exit 0
      fi
      echo "❌ custom package manager non trouvé, installation..."
      if [ "{{.OS_TYPE}}" = "arch" ]; then 
        sudo pacman -Sy --needed --noconfirm base-devel git
        cd /tmp
        git clone https://aur.archlinux.org/paru.git
        cd paru
        makepkg -si --noconfirm
        echo "✅ paru installé"
      else
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        echo "✅ brew installé"
      fi
      echo "✅ Custom package manager installed"

  install-system-packages:
    vars:
      COMMON:
        ref: .CONFIG.system.common | splitLines | compact
      OS:
        ref: index .CONFIG.system .OS_CONFIG_SELECTOR | splitLines | compact
      PACKAGES:
        ref: concat .COMMON .OS
    cmds:
      - echo "ℹ️ Installing system packages"
      - for:
          var: PACKAGES
        task: install-package
        vars:
          CLI: '{{.ITEM | splitList "," | first}}'
          PKG: '{{.ITEM | splitList "," | last}}'
          INSTALLER: '{{.DISTRO_PACKAGE_MANAGER}} {{.ITEM | splitList "," | last}}'
      - echo "✅ System packages installed"

  install-custom-packages:
    vars:
      COMMON:
        ref: .CONFIG.custom.common | splitLines | compact
      OS:
        ref: index .CONFIG.custom .OS_CONFIG_SELECTOR | splitLines | compact
      PACKAGES:
        ref: concat .COMMON .OS
    cmds:
      - echo "ℹ️ Installing custom packages"
      - for:
          var: PACKAGES
        task: install-package
        vars:
          CLI: '{{.ITEM | splitList "," | first}}'
          PKG: '{{.ITEM | splitList "," | last}}'
          DTC: hello
          INSTALLER: '{{.CUSTOM_PACKAGE_MANAGER}} {{.ITEM | splitList "," | last}}'
      - echo "✅ Custom packages installed"

  install-custom-packages-sh:
    vars:
      COMMON:
        ref: .CONFIG.sh.common
      OS:
        ref: index .CONFIG.sh .OS_CONFIG_SELECTOR
      PACKAGES:
        ref: concat .COMMON .OS
    cmds:
      - echo "ℹ️ Installing custom packages via script"
      - for:
          var: PACKAGES
        task: install-package
        vars:
          CLI: "{{.ITEM.pkg}}"
          PKG: "{{.ITEM.pkg}}"
          INSTALLER: "{{.ITEM.sh}}"
      - echo "✅ Custom packages via script installed"

  install-custom-packages-test-file:
    vars:
      COMMON:
        ref: .CONFIG.files.common
      OS:
        ref: index .CONFIG.files .OS_CONFIG_SELECTOR
      PACKAGES:
        ref: concat .COMMON .OS
    cmds:
      - echo "ℹ️ Installing custom packages by file test"
      - for:
          var: PACKAGES
        task: test-file-install-package
        vars:
          PKG: "{{.ITEM.pkg}}"
          FILE: "{{.ITEM.file}}"
          INSTALLER: "{{.CUSTOM_PACKAGE_MANAGER}} {{.ITEM.pkg}}"
      - echo "✅ Custom packages by file test intalled"

  install-systemd-packages:
    # NOTE: some packages requires dev packages, such as rustup
    deps: [dev]
    cmds:
      - echo "ℹ️ Installing systemd packages"
      - echo "ℹ️ Installing keyd"
      - task: install-package
        vars:
          CLI: keyd
          PKG: keyd
          INSTALLER: "{{.DISTRO_PACKAGE_MANAGER}} keyd && sudo systemctl enable --now keyd"
      - echo "ℹ️ Installing wayscriber"
      - if: '[ "{{.OS_TYPE}} == arch ]'
        task: install-package
        vars:
          CLI: wayscriber
          PKG: wayscriber
          INSTALLER: "{{.DISTRO_PACKAGE_MANAGER}} wayscriber && systemctl --user enable --now wayscriber"
      - if: '[ "{{.OS_TYPE}} != arch ]'
        cmd: echo "🛠️ To install wayscriber in current system check `https://wayscriber.com/docs/getting-started/installation.html`"
      - echo "✅ Systemd packages installed"

  set-shell:
    cmd: |
      echo "ℹ️ Setting user shell"
      DESIRED_SHELL_PATH="$(command -v "{{.LOGIN_SHELL}}")"
      if [ "$(basename "${SHELL:-}")" != "{{.LOGIN_SHELL}}" ]; then
        chsh -s "$DESIRED_SHELL_PATH"
        echo "🙋‍♂️ logout/login to take into account the new shell"
      else
        echo "✅ {{.LOGIN_SHELL}} shell already set"
      fi
      echo "✅ User shell set"

  setup-fish-shell:
    cmds:
      - echo "ℹ️ Setting fish shell conf"
      - fish -c 'if not functions -q fisher; curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source && fisher install jorgebucaran/fisher; else echo "✅ fisher already installed"; end'
      - fish -c 'if fisher list | string match -q "*IlanCosman/tide*"; echo "✅ tide already installed"; else fisher install IlanCosman/tide@v6; end'
      - echo "✅ Fish shell conf set"

  install-nerd-fonts:
    cmd: |
      echo "ℹ️ Installing nerd fonts..."
      installed=$(getnf -l)
      for font in Meslo JetBrainsMono CascadiaMono Hack Hasklig; do
        echo "$installed" | grep -w $font >/dev/null && echo "✅ $font already intalled" && continue
        getnf -i $font
      done
      echo "✅ Nerd fonts installed"

  setup-user-for-docker:
    cmd: |
      echo "ℹ️ Setting user in docker group"
      if ! systemctl status docker 2>/dev/null; then
        echo "⚠️ docker service not found, skipping"
        exit 0
      fi
      sudo systemctl enable --now docker || true
      if ! getent group docker | grep -q "\b$USER\b"; then
        sudo usermod -aG docker "$USER" || true
        newgrp docker || true
        echo "⚠️ logout/login to be permanently in docker group"
      else
        echo "✅ $USER already in docker group"
      fi
      echo "✅ User set in docker group"

  # =====================

  user-packages:
    desc: "🖥️ Install shell and core terminal dependencies"
    cmds:
      - echo "ℹ️ Installing system and terminal requirements"
      - task: install-package-manager
      - task: install-system-packages
      - task: install-custom-packages
      - task: install-custom-packages-sh
      - task: install-custom-packages-test-file
      - if: '[ {{.USE_SYSTEMD}} == "true" ]'
        task: install-systemd-packages
      - task: set-shell
      - task: setup-fish-shell
      - task: install-nerd-fonts
      - task: setup-user-for-docker
      - echo "✅ System and terminal requirements installed"

  # =====================

  user-config:
    desc: Deploy config files to $HOME/.config
    cmds:
      - |
        set -eu
        echo "ℹ️ Installation des fichiers de configuration"

        mv "$HOME/.zshrc" "$HOME/.zshrc.$(date '+%Y%m%dT%HH%M').bak" || true
        mkdir -p "$HOME/.config"

        mkdir -p "$HOME/.config/fish"
        mv "$HOME/.config/fish/config.fish" "$HOME/.config/fish/config.fish.$(date '+%Y%m%dT%HH%M').bak" || true

        cp -r config/* "$HOME/.config"
        cp shell/zshrc "$HOME/.zshrc"

        cp -r dotfiles/.* "$HOME/"
        if [ -d /run/systemd/system ]; then
          sudo mkdir -p /etc/keyd
          sudo cp etc/keyd/default.conf /etc/keyd/default.conf
          sudo systemctl restart keyd
          echo "✅ keyd config installée"
        else
          echo "⏭️  keyd config skipped (systemd not available)"
        fi

        echo "✅ Installation des fichiers de configuration terminée"

  # =====================

  user-all:
    desc: "🔥 Full terminal environment (user packages + user config)"
    cmds:
      - task: user-packages
      - task: user-config

  # =====================

  devops:
    desc: Install DevOps tools (kubectl, helm, k9s, etc.)
    vars:
      PACKAGES:
        ref: .CONFIG.devops.common | splitLines | compact
      SH_PACKAGES:
        ref: .CONFIG.devops.sh
    cmds:
      - echo "ℹ️ Installing devops tools"
      - for:
          var: PACKAGES
        task: install-package
        vars:
          CLI: '{{.ITEM | splitList "," | first}}'
          PKG: '{{.ITEM | splitList "," | last}}'
          INSTALLER: '{{.CUSTOM_PACKAGE_MANAGER}} {{.ITEM | splitList "," | last}}'
      - for:
          var: SH_PACKAGES
        task: install-package
        vars:
          CLI: "{{.ITEM.cli}}"
          PKG: "{{.ITEM.cli}}"
          INSTALLER: "{{.ITEM.sh}}"

      - |
        if command -v herdr >/dev/null 2>&1; then
          echo "ℹ️ Adding herdr skill"
          npx skills add ogulcancelik/herdr --skill herdr -g
          echo "✅ herdr skill added"
        else
          echo "⏭️  herdr not found, skipping herdr skill"
        fi
      - |
        if helm diff --help >/dev/null 2>&1; then
          echo "✅ helm diff found"
        else
         helm plugin install --verify=false https://github.com/databus23/helm-diff
          echo "✅ helm diff installed"
        fi
      - echo "✅ Devops tools installed"

  # =====================

  dev:
    desc: Install Development tools
    vars:
      COMMON_PACKAGES:
        ref: .CONFIG.dev.common | splitLines | compact
      SH_PACKAGES:
        ref: .CONFIG.dev.sh
    cmds:
      - echo "ℹ️ Installing dev tools"
      - for:
          var: COMMON_PACKAGES
        task: install-package
        vars:
          CLI: '{{.ITEM | splitList "," | first}}'
          PKG: '{{.ITEM | splitList "," | last}}'
          INSTALLER: 'mise use -g {{.ITEM | splitList "," | last}}'
      - for:
          var: SH_PACKAGES
        task: install-package
        vars:
          CLI: "{{.ITEM.cli}}"
          PKG: "{{.ITEM.cli}}"
          INSTALLER: "{{.ITEM.sh}}"
      - echo "✅ Dev tools installed"

  # =====================

  all:
    desc: 🔱 Install all (user-all, devops, dev)
    cmds:
      - task: user-all
      - task: devops
      - task: dev
