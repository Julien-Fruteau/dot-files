version: "3"
silent: true

vars:
  LOGIN_SHELL: zsh
  USE_SYSTEMD:
    sh: |
      if [ "$(ps -p 1 -o comm=)" == "systemd" ]; then
        echo "true"
      else
        echo "false"
      fi
  OS_TYPE:
    sh: |
      . /etc/os-release
      case "$ID" in
        arch|cachyos)  echo "arch" ;;
        ubuntu|debian) echo "debian" ;;
        fedora)        echo "fedora" ;;
        *)             echo "Unsupported OS" && exit 1 ;;
      esac
  DISTRO_PACKAGE_MANAGER:
    sh: |
      case "{{.OS_TYPE}}" in
        arch)   echo "sudo pacman -Sy --noconfirm" ;;
        fedora) echo "sudo dnf install -y" ;;
        debian) echo "sudo apt install -y" ;;
      esac
  CUSTOM_PACKAGE_MANAGER:
    sh: |
      case "{{.OS_TYPE}}" in
        arch) echo "paru -S --noconfirm" ;;
        *)    echo "brew install" ;;
      esac
  CONFIG_RAW:
    sh: cat task/config.yaml
  CONFIG:
    ref: "fromYaml .CONFIG_RAW"
# dotenv:
#   - .env

tasks:
  default:
    cmds:
      - task --list



  do:
    cmd: echo "CLI={{.CLI}} PKG={{.PKG}}"

  # TODO: WORKS
  build:
    vars:
      CONF:
        ref: .CONFIG.test
    cmds:
      - for:
          var: CONF
        cmd: 'echo {{.ITEM}}'
      - for:
          var: CONF
        task: do
        vars:
          CLI: '{{.ITEM | splitList "," | first}}'
          PKG: '{{.ITEM | splitList "," | last}}'

  package-manager:
    desc: install Paru or Brew based on distro
    cmd: |
      set -eu
      if  command -v paru >/dev/null 2>&1 || command -v brew >/dev/null 2>&1 ; then
        exit 0
      fi
      echo "❌ custom package manager non trouvé, installation..."
      if [ "{{.OS_TYPE}}" = "arch" ]; then 
        sudo pacman -Sy --needed --noconfirm base-devel git
        cd /tmp
        git clone https://aur.archlinux.org/paru.git
        cd paru
        makepkg -si --noconfirm
        echo "✅ paru installé"
      else
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        echo "✅ brew installé"
      fi

  install-pkg-bycli-test:
    cmd: |
      if ! command -v {{.CLI}} >/dev/null 2>&1; then
        echo "❌ {{.PKG}} non trouvé, installation..."
        {{.INSTALLER}}
      else
        echo "✅ {{.PKG}} trouvé"
      fi

  install-pkg-byfile-test:
    cmd: |
      if ! [ -f "{{.FILE}}" ]; then
        echo "❌ {{.PKG}} non trouvé, installation..."
        {{.INSTALLER}}
      else
        echo "✅ {{.PKG}} trouvé"
      fi

  install-term:
    vars:
      PKGS_SYS:
        ref: .CONFIG.system
      PKGS_USER:
        ref: .CONFIG.user
      PKGS_USER_ARCH:
        ref: .CONFIG.user-arch
      PKGS_FILE_ARCH:
        ref: .CONFIG.files.arch
      PKGS_FILE_OTHER:
        ref: .CONFIG.files.other
    cmds:
      - echo "ℹ️ Installation des prérequis du terminal"
      - for:
          var: PKGS_SYS
        task: install-pkg-bycli-test
        vars:
          CLI: "{{.ITEM.cli}}"
          PKG: "{{.ITEM.pkg}}"
          INSTALLER: "{{.DISTRO_PACKAGE_MANAGER}} {{.PKG}}"

      - |
        DESIRED_SHELL_PATH="$(command -v "{{.LOGIN_SHELL}}")"
        if [ "$(basename "${SHELL:-}")" != "{{.LOGIN_SHELL}}" ]; then
          chsh -s "$DESIRED_SHELL_PATH"
          echo "🙋‍♂️ logout login pour prendre en compte le nouveau shell"
        else
          echo "✅ {{.LOGIN_SHELL}} shell déjà configuré"
        fi

      - for:
          var: PKGS_USER
        task: install-pkg-bycli-test
        vars:
          CLI: "{{.ITEM.cli}}"
          PKG: "{{.ITEM.pkg}}"
          INSTALLER: "{{.CUSTOM_PACKAGE_MANAGER}} {{.PKG}}"

      - if: '[ {{.OS_TYPE}} == "arch" ]'
        for:
          var: PKGS_USER_ARCH
        task: install-pkg-bycli-test
        vars:
          FILE: "{{.ITEM.file}}"
          PKG: "{{.ITEM.pkg}}"
          INSTALL: "{{.CUSTOM_PACKAGE_MANAGER}} {{.PKG}}"

      - if: '[ {{.OS_TYPE}} == "arch" ]'
        for:
          var: PKGS_FILE_ARCH
        task: install-pkg-byfile-test
        vars:
          FILE: "{{.ITEM.file}}"
          PKG: "{{.ITEM.pkg}}"
          INSTALL: "{{.CUSTOM_PACKAGE_MANAGER}} {{.PKG}}"

      - if: '[ {{.OS_TYPE}} != "arch" ]'
        for:
          var: PKGS_FILE_OTHER
        task: install-pkg-byfile-test
        vars:
          FILE: "{{.ITEM.file}}"
          PKG: "{{.ITEM.pkg}}"
          INSTALL: "{{.CUSTOM_PACKAGE_MANAGER}} {{.PKG}}"

      - if: '[ {{.OS_TYPE}} != "arch" ]'
        task: install-pkg-bycli-test
        vars:
          CLI: getnf
          PKG: getnf
          INSTALLER: "curl -fsSL https://raw.githubusercontent.com/getnf/getnf/main/install.sh | bash"

      - |
        fish -c 'if not functions -q fisher; curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source && fisher install jorgebucaran/fisher; else echo "✅ fisher déjà installé"; end'
        fish -c 'if fisher list | string match -q "*IlanCosman/tide*"; echo "✅ tide déjà installé"; else fisher install IlanCosman/tide@v6; end'
      - |
        echo "installation de nerd fonts..."
        getnf -i Meslo,JetBrainsMono,CascadiaMono,Hack,Hasklig
        echo "✅ nerd fonts installées"

      - if: '[ {{.USE_SYSTEMD}} == "true" ]'
        task: install-pkg-bycli-test
        vars:
          CLI: keyd
          PKG: keyd
          INSTALLER: "{{.DISTRO_PACKAGE_MANAGER}} {{.PKG}}"
      - if: '[ {{.USE_SYSTEMD}} == "true" ]'
        cmd: systemctl --user enable --now keyd || true

      - if: '[ {{.USE_SYSTEMD}} == "true" && {{.OS_TYPE}} == "arch" ]'
        task: install-pkg-bycli-test
        vars:
          CLI: wayscriber
          PKG: wayscriber
          INSTALLER: "{{.DISTRO_PACKAGE_MANAGER}} {{.PKG}}"
      - if: '[ {{.USE_SYSTEMD}} == "true" && {{.OS_TYPE}} == "arch" ]'
        cmd: systemctl --user enable --now wayscriber || true
      - if: '[ {{.USE_SYSTEMD}} == "true" && {{.OS_TYPE}} != "arch" ]'
        cmd: echo "🛠️ To install wayscriber in current system check `https://wayscriber.com/docs/getting-started/installation.html`"

      - |
        sudo systemctl enable --now docker || true
        if ! getent group docker | grep -q "\b$USER\b"; then
          echo "ℹ️  ajout de $USER au groupe docker..."
          sudo usermod -aG docker "$USER" || true
          newgrp docker || true
          echo "⚠️ logout/login pour être dans le group docker"
        else
          echo "✅ $USER déjà dans le groupe docker"
        fi
      - echo "✅ Tous les prérequis du terminal sont installés"

  term-all:
    desc: 🔥 Full terminal environment (shell install + config deployment)
    cmds:
      - task: term
      - task: config-terminal

  term:
    desc: 🖥️ Install shell and core terminal dependencies
    cmds:
      - task: package-manager
      - task: install-term

  config-terminal:
    desc: Deploy config files to $HOME/.config
    cmds:
      - |
        set -eu
        echo "ℹ️ Installation des fichiers de configuration"

        mv "$HOME/.zshrc" "$HOME/.zshrc.$(date '+%Y%m%dT%HH%M').bak" || true
        mkdir -p "$HOME/.config"

        mkdir -p "$HOME/.config/fish"
        mv "$HOME/.config/fish/config.fish" "$HOME/.config/fish/config.fish.$(date '+%Y%m%dT%HH%M').bak" || true

        cp -r config/* "$HOME/.config"
        cp shell/zshrc "$HOME/.zshrc"

        cp -r dotfiles/.* "$HOME/"
        if [ -d /run/systemd/system ]; then
          sudo mkdir -p /etc/keyd
          sudo cp etc/keyd/default.conf /etc/keyd/default.conf
          sudo systemctl restart keyd
          echo "✅ keyd config installée"
        else
          echo "⏭️  keyd config skipped (systemd not available)"
        fi

        echo "✅ Installation des fichiers de configuration terminée"

  devops:
    desc: Install DevOps tools (kubectl, helm, k9s, etc.)
    vars:
      PKGS_DEVOPS:
        ref: .CONFIG.user-devops
      cmds:
        - echo "ℹ️ Installation des outils devops"
        - for:
            var: PKGS_MISE
          task: install-pkg-bycli-test
          vars:
            CLI: "{{.ITEM}}"
            PKG: "{{.ITEM}}"
            INSTALLER: "{{.CUSTOM_PACKAGE_MANAGER}} {{.ITEM}}"

        - helm plugin install https://github.com/databus23/helm-diff
        - echo "✅ Tous les prérequis devops sont installés"

  dev:
    desc: Install development tools (pyenv, nvm, go, rust, etc.)
    vars:
      PKGS_DEV:
        - python
        - node
        - go
      cmds:
        - echo "ℹ️ Installation des outils de développement"
        - for:
            var: PKGS_MISE
          task: install-pkg-bycli-test
          vars:
            CLI: "{{.ITEM}}"
            PKG: "{{.ITEM}}"
            INSTALLER: "mise use -g {{.PKG}}"
        - task: install-pkg-bycli-test
          vars:
            CLI: rustup
            PKG: rustup
            INSTALLER: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh && rustup toolchain install stable"
        - echo "✅ Tous les prérequis de développement sont installés"

  help:
    desc: Show available commands
    cmds:
      - task --list || go-task --list
