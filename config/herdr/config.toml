[keys]
prefix = "ctrl+b"
goto = "prefix+g"
new_tab = "prefix+c"
next_tab = "prefix+n"
previous_tab = "prefix+p"
focus_pane_left = "alt+y"
focus_pane_right = "alt+o"
focus_pane_down = "alt+u"
focus_pane_up = "alt+i"
navigate_workspace_up = "k"
navigate_workspace_down = "j"
split_horizontal = "ctrl+alt+u"
split_vertical = "ctrl+alt+o"
next_workspace = "ctrl+alt+n"
previous_workspace = "ctrl+alt+p"

[ui]
agent_panel_sort = "spaces"
